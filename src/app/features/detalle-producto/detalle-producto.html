<main>
    <div class="formGroup">
        @if (cargando()) {
            <p>Cargando...</p>
        } @else if (producto()) {
            <div appResaltar>
                <p>{{ producto()!.nombre }}</p>
                <p>{{ (producto()?.precio ?? 0) | monedaLocal : '$' }}</p>
            </div>
        }
    </div>
</main>
