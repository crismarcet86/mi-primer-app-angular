<div class="ticket-card">
  <h2>Crear Nuevo Ticket</h2>

  <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="ticket-form">
    
    <!-- Campo: Título -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Título</mat-label>
      <input matInput formControlName="titulo" placeholder="Ej. Falla en el servidor" />
      @if (ticketForm.get('titulo')?.hasError('required') && ticketForm.get('titulo')?.touched) {
        <mat-error>El título es obligatorio.</mat-error>
      }
      @if (ticketForm.get('titulo')?.hasError('minlength') && ticketForm.get('titulo')?.touched) {
        <mat-error>Debe tener al menos 5 caracteres.</mat-error>
      }
    </mat-form-field>

    <!-- Botón de Enviar -->
    <div class="form-actions">
      <button mat-flat-button color="primary" type="submit" [disabled]="ticketForm.invalid">
        Crear Ticket
      </button>
    </div>

  </form>
</div>
